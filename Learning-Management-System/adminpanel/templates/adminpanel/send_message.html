{% extends "main/base_admin.html" %}

{% block content %}
<div class="container">
    <h2 class="mb-4">📩 Send Message to {{ receiver.username }}</h2>

    <form method="post" class="card shadow p-4">
        {% csrf_token %}

        {{ form.as_p }}

        <div class="mt-3">
            <button type="submit" class="btn btn-primary">
                Send
            </button>

            <a href="{% url 'adminpanel:admin-dashboard' %}" 
               class="btn btn-secondary ms-2">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
