{% extends "main/base_teacher.html" %}
{% block title %}Edit Lesson{% endblock %}

{% block content %}
<h3>Edit Lesson – {{ lesson.course.title }}</h3>

<form method="post" enctype="multipart/form-data" class="card p-4 shadow-sm">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" name="title" value="{{ lesson.title }}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="4">{{ lesson.description }}</textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Video URL</label>
        <input type="url" name="video_url" value="{{ lesson.video_url }}" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Document</label>
        <input type="file" name="document" class="form-control">
        {% if lesson.document %}
            <small class="text-muted">Current: {{ lesson.document.name }}</small>
        {% endif %}
    </div>

    <div class="mb-3">
        <label class="form-label">Order</label>
        <input type="number" name="order" value="{{ lesson.order }}" class="form-control">
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
            💾 Save Changes
        </button>
        <a href="{% url 'lesson_list' lesson.course.id %}" class="btn btn-secondary">
            Cancel
        </a>
    </div>
</form>
{% endblock %}
