{% block content %}
<div class="container-fluid">

  <div class="card border-0 shadow rounded-4 overflow-hidden">

    <!-- ===== Header ===== -->
    <div class="card-header bg-white px-4 py-3 border-bottom">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <h4 class="fw-bold mb-1">
            📩 {{ message.subject|default:"(No Subject)" }}
          </h4>
          <small class="text-muted">
            {{ message.created_at|date:"M d, Y • h:i A" }}
          </small>
        </div>
        <span class="badge bg-primary-subtle text-primary px-3 py-2">
          Message
        </span>
      </div>
    </div>

    <!-- ===== Meta Info ===== -->
    <div class="px-4 py-3 bg-light border-bottom">
      <div class="row g-3">
        <div class="col-md-6">
          <div class="small text-muted">From</div>
          <div class="fw-semibold">
            👤 {{ message.sender.username }}
          </div>
        </div>
        <div class="col-md-6 text-md-end">
          <div class="small text-muted">To</div>
          <div class="fw-semibold">
            👤 {{ message.receiver.username }}
          </div>
        </div>
      </div>
    </div>

    <!-- ===== Message Body ===== -->
    <div class="card-body px-4 py-4">
      <div class="border rounded-3 p-4 bg-white shadow-sm">
        {{ message.body|linebreaks }}
      </div>
    </div>

    <!-- ===== Actions ===== -->
    <div class="card-footer bg-white border-0 px-4 py-3 d-flex justify-content-between">
      <div>
        <a href="{% url 'adminpanel:inbox' %}" class="btn btn-outline-primary btn-sm">
          📥 Inbox
        </a>
        <a href="{% url 'adminpanel:sent-messages' %}" class="btn btn-outline-secondary btn-sm ms-2">
          📤 Sent
        </a>
      </div>

      <a href="{% url 'adminpanel:admin-dashboard' %}" class="btn btn-light btn-sm">
        ⬅ Dashboard
      </a>
    </div>

  </div>

</div>
{% endblock %}
